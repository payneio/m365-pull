server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe endpoint for Azure Container Apps (always EasyAuth-excluded).
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Security + CSP headers on every served response.
    # connect-src allows: MSAL auth, Microsoft Graph, and SharePoint/OneDrive
    # (state.json sync + recordings transcripts). frame-src allows the MSAL
    # login iframe used by ssoSilent. 'unsafe-inline' is for style-src ONLY —
    # script-src stays strict.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://login.microsoftonline.com https://graph.microsoft.com https://*.sharepoint.com; frame-src https://login.microsoftonline.com; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Hashed Vite assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
