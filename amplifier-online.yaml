# Amplifier Online - Azure Container Apps Stack Configuration
# Docs: https://github.com/microsoft/amplifier-online/blob/main/docs/stacks/web-app-aca.md
#
# Project m365-pull-app — the ACA-hosted deployment of the m365-pull SPA.
#
# WHY ACA (not static-web-app): this app has a HARD single-tenant compliance
# requirement — anonymous users must be bounced to AAD before the shell loads.
# That edge gate needs a custom single-tenant EasyAuth config, which on SWA
# requires the Standard SKU; amplifier-online provisions SWA at Free with no
# SKU knob, so the gate is undeployable there. ACA's web-container EasyAuth
# sidecar (protected: login -> RedirectToLoginPage, issuer pinned to the
# tenant) delivers the single-tenant gate at provision time.
#
# COEXISTS WITH THE OLD SWA: this is a NEW project (m365-pull-app) with NEW
# resources and a NEW ao-m365-pull-app registration. The old static-web-app
# project (m365-pull / victorious-cliff SWA / ao-m365-pull) is left fully
# intact for the dev team and is unaffected by this manifest.

name: m365-pull-app
stack: web-app-aca

services:
  # Single static-frontend container: nginx serving the built Vite SPA.
  # No api service — the SPA calls Microsoft Graph directly via MSAL.js
  # (existing "Team Pulse" registration ccef276a), so there is no backend.
  web:
    image: amplifieronlinecr.azurecr.io/m365-pull-app-web:latest
    port: 80  # nginx listen port (see Dockerfile / nginx.conf)
    protected:
      mode: login  # EasyAuth sidecar -> RedirectToLoginPage: the compliance gate
    auth: true  # registers the SPA redirect URI so MSAL.js can acquire tokens

# No api service, no managed databases — this is a pure static SPA.
